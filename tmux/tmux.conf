# update tmux.config in a active tmux session by running command below
#
#   tmux source-file ~/.tmux.conf
#

set -g set-clipboard on
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -sa terminal-overrides ",xterm-kitty:RGB"

# Forward modified keys like Shift+Enter to TUIs.
set -s extended-keys always
set -s extended-keys-format csi-u
set -g terminal-features[100] "xterm*:extkeys"

# use mouse to click panes and windows
set -g mouse on

# use vi-style copy mode
# smooth-scroll's copy-mode-vi bindings are active
setw -g mode-keys vi

# set scrollback buffer size
set -g history-limit 50000

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# delay allowed between repeats
# default: 500
# set -g repeat-time 500

# use Shift+Alt+arrow keys without prefix key to switch panes
# changed from Alt+arrow since it conflicts with [backward|forward]-word
bind -n S-M-Left select-pane -L
bind -n S-M-Right select-pane -R
bind -n S-M-Up select-pane -U
bind -n S-M-Down select-pane -D

# use prefix + r to respawn the current pane
# useful when the cli becomes uninterative (gray prompt), etc.
bind r respawn-pane -k

# use prefix + F to unset window-size (if set by iterm2 tmux, etc.)
bind-key F set-option -u window-size

# resizing panes
# prefix + Shift+Alt+Arrow    resize the pane by 5 cells in the direction of the arrow
# prefix + Shift+Ctrl+Arrow   resize the pane by 1 cell in the direction of the arrow
# -r option allows pressing combo without prefix for repeat-time (tmux config)
bind-key -r -T prefix       M-S-Up              resize-pane -U 5
bind-key -r -T prefix       M-S-Down            resize-pane -D 5
bind-key -r -T prefix       M-S-Left            resize-pane -L 5
bind-key -r -T prefix       M-S-Right           resize-pane -R 5

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# preserve current path when creating panes and windows
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
# saved under ~/.local/share/tmux/resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'

# smooth scrolling
# https://github.com/azorng/tmux-smooth-scroll
# default keybinds for reference
# bind-key -T copy-mode-vi K     run-shell -b "$HOME/.tmux/plugins/tmux-smooth-scroll/src/scroll.sh up normal"
# bind-key -T copy-mode-vi J     run-shell -b "$HOME/.tmux/plugins/tmux-smooth-scroll/src/scroll.sh down normal"
# bind-key -T copy-mode-vi C-y   run-shell -b "$HOME/.tmux/plugins/tmux-smooth-scroll/src/scroll.sh up normal"
# bind-key -T copy-mode-vi C-e   run-shell -b "$HOME/.tmux/plugins/tmux-smooth-scroll/src/scroll.sh down normal"
# bind-key -T copy-mode-vi C-Up  run-shell -b "$HOME/.tmux/plugins/tmux-smooth-scroll/src/scroll.sh up normal"
# bind-key -T copy-mode-vi C-Down run-shell -b "$HOME/.tmux/plugins/tmux-smooth-scroll/src/scroll.sh down normal"
# bind-key -T copy-mode-vi C-u   run-shell -b "$HOME/.tmux/plugins/tmux-smooth-scroll/src/scroll.sh up halfpage"
# bind-key -T copy-mode-vi C-d   run-shell -b "$HOME/.tmux/plugins/tmux-smooth-scroll/src/scroll.sh down halfpage"
# bind-key -T copy-mode-vi PPage run-shell -b "$HOME/.tmux/plugins/tmux-smooth-scroll/src/scroll.sh up fullpage"
# bind-key -T copy-mode-vi NPage run-shell -b "$HOME/.tmux/plugins/tmux-smooth-scroll/src/scroll.sh down fullpage"
# bind-key -T copy-mode-vi C-b   run-shell -b "$HOME/.tmux/plugins/tmux-smooth-scroll/src/scroll.sh up fullpage"
# bind-key -T copy-mode-vi C-f   run-shell -b "$HOME/.tmux/plugins/tmux-smooth-scroll/src/scroll.sh down fullpage"
set -g @plugin 'azorng/tmux-smooth-scroll'
set -g @smooth-scroll-speed "100"
set -g @smooth-scroll-normal "3"
set -g @smooth-scroll-easing "sine"
set -g @smooth-scroll-halfpage ""
set -g @smooth-scroll-fullpage ""
set -g @smooth-scroll-mouse "true"
set -g @smooth-scroll-exit-copy-mode-at-bottom "false"

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# https://github.com/catppuccin/tmux#installation
set -g @catppuccin_flavour "mocha"
set -g @catppuccin_window_tabs_enabled "on" # or off to disable window_tabs
set -g @catppuccin_host "off"
set -g @catppuccin_powerline_icons_theme_enabled "on"
set -g @catppuccin_l_left_separator ""
set -g @catppuccin_l_right_separator ""
set -g @catppuccin_r_left_separator ""
set -g @catppuccin_r_right_separator ""

# allowed programs to restart
set -g @resurrect-processes '"~bash" "~python" "~npm"'

# tpm uninstall with prefix+u
set -g @tpm-clean 'u'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# tmux-sensible sets aggressive-resize on which is incompatible with iterm tmux integration
# this must come after the plugin run above to ensure it overrides tmux-sensible
setw -g aggressive-resize off
